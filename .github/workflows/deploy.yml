name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # ⚙️ Create .env from ENV_FILE secret
      - name: Create environment file
        run: |
          printf "%s" "${{ secrets.ENV_FILE }}" > .env

      # 📦 Install dependencies
      - name: Install dependencies
        run: npm install

      # 🏗️ Build project
      - name: Build project
        run: npm run build

      # 🔑 Fix permission
      - name: Fix permissions before deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo chown -R ubuntu:ubuntu /home/ubuntu/royal-hayat-website

      # 🧹 Remove old build
      - name: Clean old build
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            rm -rf /home/ubuntu/royal-hayat-website/dist

      # 🚀 Copy new build
      - name: Copy new build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "dist/*"
          target: "/home/ubuntu/royal-hayat-website/"

      # 🔐 Fix permissions for nginx
      - name: Fix permissions for nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo chown -R www-data:www-data /home/ubuntu/royal-hayat-website
            sudo chmod -R 755 /home/ubuntu/royal-hayat-website

      # 🔄 Restart nginx
      - name: Restart nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo nginx -t
            sudo systemctl restart nginx
